name: CI/CD

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t face-attendance .

      - name: Run tests
        run: docker run face-attendance python -m pytest tests/ -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Railway Deploy
        run: curl -X POST ${{ secrets.RAILWAY_DEPLOY_HOOK }}